<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BeakPeek</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #080a0d;
      --panel: #10151a;
      --panel-2: #141b21;
      --panel-3: #0d1116;
      --text: #f7f8f3;
      --muted: #9aa7a7;
      --accent: #78d18c;
      --amber: #f6b84b;
      --sky: #75b7ff;
      --line: rgba(255,255,255,.1);
      --strong-line: rgba(255,255,255,.18);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background:
        linear-gradient(135deg, rgba(120,209,140,.08), transparent 34%),
        linear-gradient(180deg, #0b1012 0%, var(--bg) 46%, #050608 100%);
      color: var(--text);
      font: 15px/1.4 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: .22;
      background-image:
        linear-gradient(rgba(255,255,255,.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.08) 1px, transparent 1px);
      background-size: 80px 80px;
      mask-image: linear-gradient(180deg, black, transparent 72%);
    }

    main { width: min(1240px, calc(100vw - 48px)); margin: 0 auto; padding: 32px 0 44px; position: relative; }
    header {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 24px;
      margin-bottom: 18px;
    }
    .brand { display: flex; align-items: center; gap: 14px; min-width: 0; }
    .mark {
      width: 46px;
      height: 46px;
      display: grid;
      place-items: center;
      border: 1px solid var(--strong-line);
      border-radius: 8px;
      background: linear-gradient(135deg, rgba(120,209,140,.2), rgba(117,183,255,.12));
      color: var(--accent);
      font-size: 25px;
      font-weight: 900;
    }
    h1 { margin: 0; font-size: 34px; letter-spacing: 0; line-height: 1; }
    .status { color: var(--muted); font-variant-numeric: tabular-nums; margin-top: 5px; }
    .toolbar { display: flex; align-items: center; gap: 10px; }
    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 11px;
      color: var(--muted);
      background: rgba(255,255,255,.05);
      white-space: nowrap;
    }
    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1.42fr) minmax(330px, .78fr);
      gap: 16px;
      align-items: stretch;
    }
    .side { display: grid; gap: 16px; align-content: start; }
    .panel {
      background: color-mix(in srgb, var(--panel), transparent 5%);
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0,0,0,.26);
    }
    .hero { min-height: 620px; position: relative; background: #050505; }
    .hero img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .hero .empty { display: grid; place-items: center; height: 100%; color: var(--muted); }
    .overlay {
      position: absolute;
      inset: auto 0 0;
      padding: 30px;
      background: linear-gradient(transparent, rgba(0,0,0,.86));
    }
    .hero-top {
      position: absolute;
      top: 18px;
      left: 18px;
      right: 18px;
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }
    .tag {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(0,0,0,.48);
      border: 1px solid rgba(255,255,255,.18);
      backdrop-filter: blur(16px);
      color: var(--text);
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 20px rgba(120,209,140,.8); }
    .species { font-size: clamp(36px, 6vw, 76px); font-weight: 900; margin: 0; line-height: .96; max-width: 820px; }
    .meta { color: var(--muted); margin-top: 12px; font-size: 16px; }
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
    .stat {
      padding: 16px;
      background: linear-gradient(180deg, var(--panel-2), var(--panel-3));
      border: 1px solid var(--line);
      border-radius: 8px;
      min-width: 0;
    }
    .stat b { display: block; font-size: 34px; line-height: 1; font-variant-numeric: tabular-nums; }
    .stat span { color: var(--muted); display: block; margin-top: 7px; }
    .camera-strip { padding: 14px; }
    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      margin: 0 0 12px;
      color: var(--text);
      font-size: 14px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .08em;
    }
    .section-title span { color: var(--muted); font-size: 12px; font-weight: 700; letter-spacing: 0; text-transform: none; }
    .cameras { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; }
    .camera {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255,255,255,.04);
      min-width: 0;
    }
    .camera b, .camera span { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .camera b { font-size: 18px; }
    .camera span { color: var(--muted); font-size: 13px; margin-top: 3px; }
    .events { padding: 14px; max-height: 438px; overflow: auto; }
    .event {
      display: grid;
      grid-template-columns: 82px minmax(0, 1fr);
      gap: 12px;
      padding: 9px;
      border-radius: 8px;
      border: 1px solid transparent;
    }
    .event:hover { background: rgba(255,255,255,.05); border-color: var(--line); }
    .thumb { width: 82px; height: 62px; border-radius: 6px; object-fit: cover; background: #050505; }
    .event b, .event span { display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .event span { color: var(--muted); font-size: 13px; }
    .species-panel { padding: 14px; }
    .species-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .species-chip {
      max-width: 100%;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 7px 10px;
      background: rgba(255,255,255,.04);
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
    }
    button {
      appearance: none; border: 1px solid var(--line); border-radius: 999px; color: var(--text);
      background: rgba(255,255,255,.08); padding: 9px 14px; cursor: pointer; font: inherit; font-weight: 750;
    }
    button:hover { background: rgba(255,255,255,.13); }
    @media (max-width: 920px) {
      main { width: min(100vw - 32px, 720px); padding-top: 24px; }
      header { grid-template-columns: 1fr; align-items: start; }
      .toolbar { width: 100%; justify-content: space-between; }
      .grid { grid-template-columns: 1fr; }
      .hero { min-height: 430px; }
      .stats { grid-template-columns: 1fr; }
      .cameras { grid-template-columns: 1fr; }
      .species { font-size: clamp(34px, 11vw, 52px); }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div class="brand">
        <div class="mark">B</div>
        <div>
          <h1>BeakPeek</h1>
          <div class="status" id="status">Loading feeder intelligence</div>
        </div>
      </div>
      <div class="toolbar">
        <div class="pill" id="streamStatus">Live stream ready</div>
        <button id="refresh">Refresh</button>
      </div>
    </header>

    <section class="stats">
      <div class="stat"><b id="visits">0</b><span>visits in 2h</span></div>
      <div class="stat"><b id="species">0</b><span>species logged</span></div>
      <div class="stat"><b id="cameras">0</b><span>camera feeds</span></div>
    </section>

    <section class="grid">
      <article class="panel hero" id="hero"></article>
      <aside class="side">
        <section class="panel camera-strip">
          <h2 class="section-title">Feed Map <span id="cameraMeta">0 cameras</span></h2>
          <div class="cameras" id="cameraStrip"></div>
        </section>
        <section class="panel events">
          <h2 class="section-title">Recent Sightings <span id="eventMeta">0 events</span></h2>
          <div id="events"></div>
        </section>
        <section class="panel species-panel">
          <h2 class="section-title">Species Index <span id="speciesMeta">Archive</span></h2>
          <div class="species-list" id="speciesList"></div>
        </section>
      </aside>
    </section>
  </main>

  <script>
    const state = { events: [], summary: null, species: [] };
    const $ = id => document.getElementById(id);
    const escapeHTML = value => String(value ?? '')
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;')
      .replaceAll("'", '&#039;');
    const relative = ts => {
      const seconds = Math.max(0, (Date.now() - ts) / 1000);
      if (seconds < 60) return 'just now';
      const minutes = Math.floor(seconds / 60);
      if (minutes < 60) return `${minutes}m ago`;
      const hours = Math.floor(minutes / 60);
      return hours < 24 ? `${hours}h ago` : `${Math.floor(hours / 24)}d ago`;
    };

    function render() {
      const latest = state.summary?.latest;
      const speciesCount = Math.max(state.summary?.todaySpecies ?? 0, state.species.length);
      const cameras = state.summary?.cameras ?? [];
      const cameraCounts = new Map(cameras.map(camera => [camera, 0]));
      for (const event of state.events) {
        cameraCounts.set(event.cameraId, (cameraCounts.get(event.cameraId) ?? 0) + 1);
      }

      $('visits').textContent = state.summary?.visitsLast2h ?? 0;
      $('species').textContent = speciesCount;
      $('cameras').textContent = cameras.length;
      $('status').textContent = `Updated ${new Date(state.summary?.generatedAt ?? Date.now()).toLocaleTimeString()}`;
      $('cameraMeta').textContent = `${cameras.length} cameras`;
      $('eventMeta').textContent = `${state.events.length} loaded`;
      $('speciesMeta').textContent = `${speciesCount} names`;

      $('hero').innerHTML = latest ? `
        <img src="${latest.imageUrl}" alt="">
        <div class="hero-top">
          <div class="tag"><span class="dot"></span>Latest visitor</div>
          <div class="tag">${escapeHTML(latest.cameraName)}</div>
        </div>
        <div class="overlay">
          <p class="species">${escapeHTML(latest.commonName ?? latest.scientificName ?? 'Visitor')}</p>
          <div class="meta">${escapeHTML(latest.scientificName ?? latest.cameraName)} · ${relative(latest.timestamp)}</div>
        </div>
      ` : '<div class="empty">Waiting for the first feeder visit</div>';

      $('cameraStrip').innerHTML = [...cameraCounts.entries()].map(([camera, count]) => `
        <div class="camera">
          <b>${escapeHTML(camera)}</b>
          <span>${count} recent sighting${count === 1 ? '' : 's'}</span>
        </div>
      `).join('') || '<div class="camera"><b>Offline</b><span>No configured feeds</span></div>';

      $('events').innerHTML = state.events.map(event => `
        <div class="event">
          <img class="thumb" src="${event.imageUrl}" alt="">
          <div>
            <b>${escapeHTML(event.commonName ?? event.scientificName ?? 'Visitor')}</b>
            <span>${escapeHTML(event.cameraName)} · ${relative(event.timestamp)}</span>
          </div>
        </div>
      `).join('') || '<div class="event"><span>No events yet</span></div>';

      $('speciesList').innerHTML = state.species.slice(0, 12).map(species => `
        <span class="species-chip">${escapeHTML(species.commonName ?? species.scientificName ?? 'Unknown')}</span>
      `).join('') || '<span class="species-chip">Waiting for detections</span>';
    }

    async function load() {
      $('streamStatus').textContent = 'Syncing';
      const [summary, events, species] = await Promise.all([
        fetch('/api/v1/summary').then(r => r.json()),
        fetch('/api/v1/events?limit=24').then(r => r.json()),
        fetch('/api/v1/species').then(r => r.json()),
      ]);
      state.summary = summary;
      state.events = events;
      state.species = species;
      $('streamStatus').textContent = 'Live';
      render();
    }

    $('refresh').addEventListener('click', load);
    const stream = new EventSource('/api/v1/stream');
    stream.addEventListener('event', load);
    stream.addEventListener('open', () => { $('streamStatus').textContent = 'Live'; });
    stream.addEventListener('error', () => { $('streamStatus').textContent = 'Reconnecting'; });
    load();
    setInterval(render, 30000);
  </script>
</body>
</html>
